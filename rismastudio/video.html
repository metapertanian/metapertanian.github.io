  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<div id="navbar"></div>

<div class="menu">
  <h2>Generator Prompt Video (Veo)</h2>

  <textarea id="videoInput" placeholder="Tulis konsep video..."></textarea>
  <button onclick="generateVideo()">Generate & Simpan</button>

  <h3>Prompt Video Tersimpan</h3>
  <div id="videoList"></div>
</div>

<script>
fetch("navbar.html")
  .then(r=>r.text())
  .then(d=>{
    document.getElementById("navbar").innerHTML=d;

const script = document.createElement("script");
    script.type = "module";
    script.src = "main.js";
    document.body.appendChild(script);
    setTimeout(()=>loadData("video","videoList"),1500);
  });

function generateVideo(){
  const text = document.getElementById("videoInput").value;
  if(!text) return alert("Isi dulu!");

  const prompt = "Buatkan prompt video cinematic detail untuk Veo berdasarkan konsep:\n\n" + text;

  saveData("video", prompt);
  document.getElementById("videoInput").value="";
  setTimeout(()=>loadData("video","videoList"),1000);
}
</script>
