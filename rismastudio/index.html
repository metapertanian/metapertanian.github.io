<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="navbar"></div>

<div class="menu">
  <h1>RISMA Studio</h1>
  <p>Pilih menu di atas untuk mulai membuat konten.</p>
</div>

<script>
fetch("navbar.html")
  .then(r => r.text())
  .then(d => {
    document.getElementById("navbar").innerHTML = d;

    // PANGGIL main.js SETELAH navbar ADA
    const script = document.createElement("script");
    script.src = "main.js";   // TANPA type="module"
    document.body.appendChild(script);
  });
</script>

</body>
</html>
