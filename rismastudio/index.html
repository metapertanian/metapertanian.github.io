<!DOCTYPE html>
<html>
<head>
        <meta http-equiv="refresh" content="0; url=narasi">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RISMA Studio</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
}

/* Loading Fullscreen */
#loadingScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#mainContent{
  display:none;
  padding:20px;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
  <h2>RISMA Studio</h2>
  <p>Loading... <span id="loadingPercent">0</span>%</p>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">
  <h1>RISMA Studio</h1>
  <p>Website sudah tampil ✅</p>
</div>

<script>
(function(){

  let persen = 0;
  var loadingText = document.getElementById("loadingPercent");
  var loadingScreen = document.getElementById("loadingScreen");
  var mainContent = document.getElementById("mainContent");

  var interval = setInterval(function(){

    persen += 4;
    loadingText.innerHTML = persen;

    if(persen >= 100){
      clearInterval(interval);

      loadingScreen.style.display = "none";
      mainContent.style.display = "block";
    }

  }, 80);

})();
</script>

</body>
</html>
