<link rel="stylesheet" href="style.css">

<div id="navbar"></div>

<div class="menu">
  <h2>Generator Narasi</h2>

  <textarea id="narasiInput" placeholder="Tulis ide narasi..."></textarea>
  <button onclick="generateNarasi()">Generate & Simpan</button>

  <h3>Narasi Tersimpan</h3>
  <div id="narasiList"></div>
</div>

<script>
fetch("navbar.html")
  .then(r=>r.text())
  .then(d=>{
    document.getElementById("navbar").innerHTML=d;

const script = document.createElement("script");
    script.type = "module";
    script.src = "main.js";
    document.body.appendChild(script);
    setTimeout(()=>loadData("narasi","narasiList"),1500);
  });

function generateNarasi(){
  const text = document.getElementById("narasiInput").value;
  if(!text) return alert("Isi dulu!");

  const prompt = "Buatkan narasi berdasarkan ide berikut:\n\n" + text;

  saveData("narasi", prompt);
  document.getElementById("narasiInput").value="";
  setTimeout(()=>loadData("narasi","narasiList"),1000);
}
</script>
