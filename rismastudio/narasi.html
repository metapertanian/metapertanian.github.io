<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Generator Narasi - RISMA Studio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="container">

  <div class="card">
    <h2>Generator Narasi Profesional</h2>

    <textarea id="narasiInput" rows="6"
      placeholder="Tulis ide narasi atau prompt di sini..."></textarea>

    <button class="btn-primary" onclick="generateAI()">
      Generate AI (Gratis)
    </button>

    <button class="btn-primary" onclick="saveData()">
      Simpan
    </button>

  </div>

  <div id="dataList"></div>
  <div class="pagination" id="pagination"></div>

</div>

<!-- Load Navbar -->
<script>
fetch("navbar.html")
.then(res => res.text())
.then(data => {
  document.getElementById("navbar").innerHTML = data;
});
</script>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/narasi.js"></script>

</body>
</html>
